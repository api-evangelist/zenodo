aid: zenodo
name: Zenodo
description: >
  Zenodo is a free, open research data repository operated by CERN and co-developed
  under the European OpenAIRE program. It enables researchers to deposit, share, and
  preserve any research output — including datasets, software, papers, preprints,
  presentations, and multimedia — regardless of format, size, or discipline. Every
  upload receives a Digital Object Identifier (DOI) for persistent citation and
  discoverability. Zenodo provides a REST API for programmatic deposit management,
  record search and retrieval, and file management, as well as an OAI-PMH endpoint
  for metadata harvesting. The platform is built on InvenioRDM and stores all data
  at the CERN Data Centre with replicas and nightly tape backups.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Research
  - Open Data
  - Repository
  - DOI
  - Datasets
  - Software
  - CERN
  - OpenAIRE
  - InvenioRDM
  - Open Science
  - Metadata
  - Harvesting
url: https://raw.githubusercontent.com/api-evangelist/zenodo/refs/heads/main/apis.yml
created: '2026-06-12'
modified: '2026-06-12'
specificationVersion: '0.19'

apis:

  - aid: zenodo-rest-api
    name: Zenodo REST API
    description: >
      The primary REST API for Zenodo allowing programmatic deposit creation,
      file upload, record publication, and record search and retrieval.
      Supports personal access token authentication via OAuth 2.0 Bearer tokens.
      Provides endpoints for deposits, records, files, communities, funders,
      grants, and licenses.
    humanURL: https://developers.zenodo.org/
    baseURL: https://zenodo.org/api
    tags:
      - Deposits
      - Records
      - Files
      - Communities
      - Funders
      - Grants
      - Licenses
      - DOI
    properties:
      - type: Documentation
        url: https://developers.zenodo.org/
      - type: Sandbox
        url: https://sandbox.zenodo.org
      - type: OpenAPI
        url: openapi/zenodo-rest-api-openapi.yml

  - aid: zenodo-oai-pmh-api
    name: Zenodo OAI-PMH API
    description: >
      Open Archives Initiative Protocol for Metadata Harvesting endpoint that
      allows bulk harvesting of Zenodo metadata in formats including oai_dc,
      marcxml, and oai_datacite4. Supports selective harvesting by community.
    humanURL: https://developers.zenodo.org/#oai-pmh
    baseURL: https://zenodo.org/oai2d
    tags:
      - Metadata
      - Harvesting
      - OAI-PMH
      - DataCite
    properties:
      - type: Documentation
        url: https://developers.zenodo.org/#oai-pmh

