name: Zenodo Vocabulary
description: >
  Controlled vocabulary terms used by Zenodo (InvenioRDM) for record metadata.
  These terms map to vocabulary endpoints at /api/vocabularies/{type} and
  dedicated endpoints for names, funders, awards, affiliations, and subjects.

resourceTypes:
  description: Primary resource type identifiers used in metadata.resource_type.id
  endpoint: /api/vocabularies/resourcetypes
  terms:
    - id: dataset
      label: Dataset
      description: Raw or processed research data.
    - id: software
      label: Software
      description: Source code, scripts, or compiled programs.
    - id: publication-article
      label: Journal article
      description: Peer-reviewed article published in a journal.
    - id: publication-preprint
      label: Preprint
      description: Scientific manuscript prior to peer review.
    - id: publication-report
      label: Report
      description: Technical or project report.
    - id: publication-thesis
      label: Thesis
      description: Doctoral or masters thesis.
    - id: publication-book
      label: Book
      description: Complete book.
    - id: publication-section
      label: Book section
      description: Chapter or section within a book.
    - id: publication-conferencepaper
      label: Conference paper
      description: Paper presented at a conference and published in proceedings.
    - id: publication-datamanagementplan
      label: Data management plan
      description: Formal plan describing research data management.
    - id: publication-other
      label: Other
      description: Publication type not covered by other terms.
    - id: image-photo
      label: Photo
      description: Photograph or still image.
    - id: image-figure
      label: Figure
      description: Diagram, chart, or illustration.
    - id: image-diagram
      label: Diagram
      description: Visual representation such as a flowchart or network diagram.
    - id: image-drawing
      label: Drawing
      description: Hand-drawn or digital illustration.
    - id: image-other
      label: Other
      description: Image type not covered by other terms.
    - id: video
      label: Video/Audio
      description: Audiovisual recording.
    - id: presentation
      label: Presentation
      description: Slides or presentation materials.
    - id: poster
      label: Poster
      description: Scientific poster for a conference or event.
    - id: lesson
      label: Lesson
      description: Educational or instructional material.
    - id: physicalobject
      label: Physical object
      description: Physical specimen, sample, or artefact.
    - id: workflow
      label: Workflow
      description: Computational workflow or data pipeline.
    - id: event
      label: Event
      description: Conference, workshop, or other event.
    - id: model
      label: Model
      description: Computational or physical model.
    - id: interactiveresource
      label: Interactive resource
      description: Interactive resource or simulation.
    - id: other
      label: Other
      description: Research output not classified by other types.

accessRights:
  description: Access and visibility settings for records and files.
  values:
    - id: public
      label: Public
      description: Visible to anyone without authentication.
    - id: restricted
      label: Restricted
      description: Visible only to record owners and users with access links.

communityTypes:
  description: Community classification types used in metadata.type.id
  endpoint: /api/vocabularies/communitytypes
  terms:
    - id: organization
      label: Organization
      description: A research institution, company, or other organization.
    - id: event
      label: Event
      description: A conference, workshop, or other event.
    - id: topic
      label: Topic
      description: Thematic collection around a research topic.
    - id: project
      label: Project
      description: A funded or collaborative research project.

memberRoles:
  description: Role identifiers for community membership.
  terms:
    - id: owner
      label: Owner
      description: Full administrative access to the community.
    - id: manager
      label: Manager
      description: Can manage members and settings but cannot delete.
    - id: curator
      label: Curator
      description: Can manage records but not membership.
    - id: reader
      label: Reader
      description: Read-only access to restricted community records.

contributorRoles:
  description: Role identifiers for record contributors. Endpoint /api/vocabularies/contributorsroles
  terms:
    - id: contactperson
      label: Contact person
    - id: datacollector
      label: Data collector
    - id: datacurator
      label: Data curator
    - id: datamanager
      label: Data manager
    - id: distributor
      label: Distributor
    - id: editor
      label: Editor
    - id: hostinginstitution
      label: Hosting institution
    - id: other
      label: Other
    - id: producer
      label: Producer
    - id: projectleader
      label: Project leader
    - id: projectmanager
      label: Project manager
    - id: projectmember
      label: Project member
    - id: registrationagency
      label: Registration agency
    - id: registrationauthority
      label: Registration authority
    - id: relatedperson
      label: Related person
    - id: researcher
      label: Researcher
    - id: researchgroup
      label: Research group
    - id: rightsholder
      label: Rights holder
    - id: sponsor
      label: Sponsor
    - id: supervisor
      label: Supervisor
    - id: workpackageleader
      label: Work package leader

creatorRoles:
  description: Role identifiers for record creators. Endpoint /api/vocabularies/creatorsroles
  terms:
    - id: other
      label: Other
    - id: researcher
      label: Researcher

