descriptionTypes:
  description: Type identifiers for additional descriptions. Endpoint /api/vocabularies/descriptiontypes
  terms:
    - id: abstract
      label: Abstract
    - id: methods
      label: Methods
    - id: seriesinformation
      label: Series information
    - id: tableofcontents
      label: Table of contents
    - id: technicalinfo
      label: Technical info
    - id: other
      label: Other

dateTypes:
  description: Date type identifiers. Endpoint /api/vocabularies/datetypes
  terms:
    - id: accepted
      label: Accepted
    - id: available
      label: Available
    - id: collected
      label: Collected
    - id: copyrighted
      label: Copyrighted
    - id: created
      label: Created
    - id: issued
      label: Issued
    - id: other
      label: Other
    - id: submitted
      label: Submitted
    - id: updated
      label: Updated
    - id: valid
      label: Valid
    - id: withdrawn
      label: Withdrawn

identifierSchemes:
  description: Identifier scheme codes used in person_or_org.identifiers and related_identifiers.
  terms:
    - id: orcid
      label: ORCID
      description: Open Researcher and Contributor ID (e.g. 0000-0002-1825-0097)
    - id: doi
      label: DOI
      description: Digital Object Identifier
    - id: isni
      label: ISNI
      description: International Standard Name Identifier
    - id: gnd
      label: GND
      description: Gemeinsame Normdatei (German authority file)
    - id: ror
      label: ROR
      description: Research Organization Registry identifier
    - id: arxiv
      label: arXiv
      description: arXiv preprint identifier
    - id: ads
      label: ADS
      description: NASA/ADS bibcode
    - id: pmid
      label: PMID
      description: PubMed identifier
    - id: isbn
      label: ISBN
      description: International Standard Book Number
    - id: issn
      label: ISSN
      description: International Standard Serial Number
    - id: url
      label: URL
      description: Uniform Resource Locator
    - id: hal
      label: HAL
      description: HAL open archive identifier
    - id: handle
      label: Handle
      description: Handle persistent identifier
    - id: purl
      label: PURL
      description: Persistent Uniform Resource Locator
    - id: wos
      label: Web of Science
      description: Web of Science accession number
    - id: scopus
      label: Scopus
      description: Scopus EID

oaipmhMetadataFormats:
  description: Metadata formats available through the OAI-PMH endpoint at https://zenodo.org/oai2d
  terms:
    - id: oai_dc
      label: Dublin Core
      description: Simple Dublin Core metadata.
    - id: marcxml
      label: MARC XML
      description: Library exchange format MARC21 as XML.
    - id: oai_datacite4
      label: DataCite 4
      description: DataCite 4 metadata schema for DOI records.
    - id: datacite
      label: DataCite (legacy)
      description: DataCite legacy metadata format.
