    - id: ispartof
      label: Is part of
    - id: haspart
      label: Has part
    - id: isreferencedby
      label: Is referenced by
    - id: references
      label: References
    - id: isdocumentedby
      label: Is documented by
    - id: documents
      label: Documents
    - id: iscompiledby
      label: Is compiled by
    - id: compiles
      label: Compiles
    - id: isvariantformof
      label: Is variant form of
    - id: isoriginalformof
      label: Is original form of
    - id: isidenticalto
      label: Is identical to
    - id: isreviewedby
      label: Is reviewed by
    - id: reviews
      label: Reviews
    - id: isderivedfrom
      label: Is derived from
    - id: issourceof
      label: Is source of
    - id: describes
      label: Describes
    - id: isdescribedby
      label: Is described by
    - id: hasmetadata
      label: Has metadata
    - id: ismetadatafor
