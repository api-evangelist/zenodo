components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Personal access token issued from the Zenodo account settings
  responses:
    Success:
      description: Successful response
      content:
        application/json:
          schema:
            type: object
    Created:
      description: Resource created successfully
      content:
        application/json:
          schema:
            type: object
    BadRequest:
      description: Bad request - invalid input parameters
    Unauthorized:
      description: Unauthorized - authentication required
    Forbidden:
      description: Forbidden - insufficient permissions
    NotFound:
      description: Not found - resource does not exist
    InternalServerError:
      description: Internal server error
    NoContent:
      description: No content - operation completed successfully
  schemas:
    AuditLogList:
      type: object
      properties:
        hits:
          type: object
          properties:
            total:
              type: integer
            hits:
              type: array
              items:
                $ref: "#/components/schemas/AuditLogEntry"
        aggregations:
          type: object
    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          example: "9913abd2-1a7c-42cb-a73e-e48a9e1bf4f2"
        created:
          type: string
          format: date-time
        action:
          type: string
          example: "record.publish"
        resource:
          type: object
          properties:
            type:
              type: string
            id:
              type: string
        metadata:
          type: object
          properties:
            ip_address:
              type: string
            session:
              type: string
            parent_pid:
              type: string
            revision_id:
              type: integer
        user:
          type: object
          properties:
            id:
              type: string
            username:
              type: string
            email:
              type: string
        links:
          type: object
          properties:
            self:
              type: string
