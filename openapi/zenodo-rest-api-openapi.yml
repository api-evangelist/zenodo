  /api/records/{draftId}/draft/files/{file-name}:
    get:
      summary: Get draft file metadata
      tags:
        - Drafts
      operationId: getDraftFileMetadata
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
        - name: file-name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []
    delete:
      summary: Delete a draft file
      tags:
        - Drafts
      operationId: deleteADraftFile
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
        - name: file-name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []
  /api/records/{recordId}/files:
    get:
      summary: List a record's files
      tags:
        - Records Files
      operationId: listRecordFiles
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []
  /api/records/{recordId}/files/{file-name}:
    get:
